<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">自定义 CSS 与 JS 注入路径</title>
  <desc id="desc">展示将自定义 CSS 和 JavaScript 放到 source 目录并通过 Butterfly inject 配置加载的流程。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">自定义美化不要直接改主题源码</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">把自己的文件放进 source，再用 inject 引入，升级主题时更稳。</text>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="80" y="190" width="285" height="260" rx="24" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="118" y="240" font-size="24" font-weight="700" fill="#15803d">source/</text>
    <rect x="118" y="282" width="205" height="48" rx="14" fill="#dcfce7"/>
    <text x="148" y="312" font-size="15" font-weight="700" fill="#166534">css/custom.css</text>
    <rect x="118" y="352" width="205" height="48" rx="14" fill="#dbeafe"/>
    <text x="152" y="382" font-size="15" font-weight="700" fill="#1d4ed8">js/custom.js</text>
  </g>
  <line x1="375" y1="320" x2="470" y2="320" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="485" y="170" width="330" height="300" rx="24" fill="#ffffff" stroke="#fed7aa"/>
    <text x="525" y="220" font-size="24" font-weight="700" fill="#c2410c">_config.butterfly.yml</text>
    <rect x="525" y="260" width="250" height="150" rx="16" fill="#fff7ed"/>
    <text x="550" y="295" font-size="15" fill="#9a3412">inject:</text>
    <text x="570" y="323" font-size="15" fill="#9a3412">head:</text>
    <text x="590" y="351" font-size="15" fill="#9a3412">- /css/custom.css</text>
    <text x="570" y="379" font-size="15" fill="#9a3412">bottom:</text>
    <text x="590" y="407" font-size="15" fill="#9a3412">- /js/custom.js</text>
  </g>
  <line x1="825" y1="320" x2="920" y2="320" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="935" y="190" width="185" height="260" rx="24" fill="#172033"/>
    <rect x="958" y="220" width="139" height="35" rx="10" fill="#334155"/>
    <rect x="958" y="275" width="139" height="72" rx="12" fill="#60a5fa"/>
    <rect x="958" y="365" width="65" height="45" rx="10" fill="#34d399"/>
    <rect x="1032" y="365" width="65" height="45" rx="10" fill="#f59e0b"/>
    <text x="974" y="485" font-size="18" font-weight="700" fill="#ffffff">页面效果</text>
  </g>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <rect x="160" y="520" width="880" height="54" rx="18" fill="#fee2e2"/>
    <text x="190" y="553" font-size="16" font-weight="700" fill="#991b1b">注意：如果站点部署在 /blog/ 这样的子路径，inject 中的资源路径也要跟随 root 调整。</text>
  </g>
</svg>

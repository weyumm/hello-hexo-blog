<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">搜索与评论接入路径</title>
  <desc id="desc">展示 Butterfly 本地搜索和评论系统从插件、配置到页面加载的路径。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">搜索和评论怎样接进 Butterfly</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">搜索是静态数据，评论通常依赖第三方服务或自己的后端。</text>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <g filter="url(#shadow)">
      <rect x="70" y="165" width="500" height="390" rx="24" fill="#ffffff" stroke="#bfdbfe"/>
      <text x="105" y="215" font-size="26" font-weight="700" fill="#1d4ed8">本地搜索</text>
      <text x="105" y="245" font-size="15" fill="#64748b">适合新手，生成静态搜索文件后即可使用。</text>
      <rect x="120" y="290" width="150" height="62" rx="16" fill="#dbeafe"/>
      <text x="145" y="327" font-size="16" font-weight="700" fill="#1e40af">搜索插件</text>
      <line x1="275" y1="321" x2="335" y2="321" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="345" y="290" width="150" height="62" rx="16" fill="#e0f2fe"/>
      <text x="371" y="327" font-size="16" font-weight="700" fill="#0369a1">search.xml</text>
      <line x1="420" y1="357" x2="420" y2="408" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="155" y="420" width="340" height="74" rx="18" fill="#eff6ff"/>
      <text x="185" y="450" font-size="16" font-weight="700" fill="#1e40af">search.use: local_search</text>
      <text x="185" y="476" font-size="14" fill="#475569">点击搜索按钮时加载并匹配文章内容</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="630" y="165" width="500" height="390" rx="24" fill="#ffffff" stroke="#fed7aa"/>
      <text x="665" y="215" font-size="26" font-weight="700" fill="#c2410c">评论系统</text>
      <text x="665" y="245" font-size="15" fill="#64748b">先选一个方案，稳定后再考虑双评论。</text>
      <rect x="680" y="290" width="142" height="62" rx="16" fill="#ffedd5"/>
      <text x="713" y="327" font-size="16" font-weight="700" fill="#9a3412">Giscus</text>
      <rect x="850" y="290" width="142" height="62" rx="16" fill="#fef3c7"/>
      <text x="890" y="327" font-size="16" font-weight="700" fill="#92400e">Twikoo</text>
      <rect x="765" y="380" width="142" height="62" rx="16" fill="#dcfce7"/>
      <text x="807" y="417" font-size="16" font-weight="700" fill="#166534">Waline</text>
      <line x1="836" y1="452" x2="836" y2="492" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="700" y="505" width="300" height="52" rx="16" fill="#fff7ed"/>
      <text x="730" y="537" font-size="15" font-weight="700" fill="#9a3412">comments.use + 对应系统配置</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Butterfly 功能扩展选择矩阵</title>
  <desc id="desc">按价值和复杂度划分 Butterfly 扩展功能的推荐顺序。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="28" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">功能扩展先做哪一个</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">横轴代表配置复杂度，纵轴代表对读者体验的提升。</text>
  <g transform="translate(130 160)" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <rect x="0" y="0" width="900" height="500" rx="22" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <line x1="90" y1="420" x2="805" y2="420" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="90" y1="420" x2="90" y2="65" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="705" y="462" font-size="17" font-weight="700" fill="#334155">复杂度更高</text>
    <text x="28" y="78" font-size="17" font-weight="700" fill="#334155" transform="rotate(-90 28 78)">价值更高</text>
    <rect x="110" y="90" width="265" height="150" rx="18" fill="#dcfce7" opacity="0.75"/>
    <text x="132" y="126" font-size="20" font-weight="700" fill="#166534">优先做</text>
    <text x="132" y="158" font-size="15" fill="#166534">搜索、RSS、站点地图</text>
    <text x="132" y="184" font-size="15" fill="#166534">代码块、封面、目录</text>
    <rect x="430" y="90" width="320" height="150" rx="18" fill="#dbeafe" opacity="0.78"/>
    <text x="452" y="126" font-size="20" font-weight="700" fill="#1d4ed8">谨慎推进</text>
    <text x="452" y="158" font-size="15" fill="#1d4ed8">评论系统、Algolia、Pjax</text>
    <text x="452" y="184" font-size="15" fill="#1d4ed8">需要账号、后端或额外调试</text>
    <rect x="110" y="275" width="265" height="115" rx="18" fill="#fef3c7" opacity="0.82"/>
    <text x="132" y="311" font-size="20" font-weight="700" fill="#92400e">顺手优化</text>
    <text x="132" y="343" font-size="15" fill="#92400e">主题色、自定义 CSS</text>
    <text x="132" y="369" font-size="15" fill="#92400e">文章 meta 和摘要</text>
    <rect x="430" y="275" width="320" height="115" rx="18" fill="#fee2e2" opacity="0.78"/>
    <text x="452" y="311" font-size="20" font-weight="700" fill="#b91c1c">最后再加</text>
    <text x="452" y="343" font-size="15" fill="#b91c1c">Live2D、烟花、彩带背景</text>
    <text x="452" y="369" font-size="15" fill="#b91c1c">好看但更容易影响性能</text>
    <g filter="url(#shadow)">
      <circle cx="210" cy="160" r="34" fill="#22c55e"/>
      <text x="177" y="166" font-size="15" font-weight="700" fill="#ffffff">搜索</text>
      <circle cx="300" cy="190" r="30" fill="#10b981"/>
      <text x="276" y="196" font-size="14" font-weight="700" fill="#ffffff">RSS</text>
      <circle cx="515" cy="170" r="36" fill="#3b82f6"/>
      <text x="486" y="176" font-size="14" font-weight="700" fill="#ffffff">评论</text>
      <circle cx="650" cy="150" r="32" fill="#6366f1"/>
      <text x="626" y="156" font-size="14" font-weight="700" fill="#ffffff">Pjax</text>
      <circle cx="250" cy="332" r="34" fill="#f59e0b"/>
      <text x="220" y="338" font-size="14" font-weight="700" fill="#ffffff">CSS</text>
      <circle cx="585" cy="332" r="34" fill="#ef4444"/>
      <text x="552" y="338" font-size="14" font-weight="700" fill="#ffffff">动效</text>
    </g>
  </g>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="155" y="690" width="890" height="38" rx="19" fill="#172033"/>
    <text x="190" y="715" font-size="16" fill="#e2e8f0">建议：每次只开启一类功能，执行 clean / generate / server 后再继续。</text>
  </g>
</svg>

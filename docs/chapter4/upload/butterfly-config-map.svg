<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Hexo 与 Butterfly 配置文件关系</title>
  <desc id="desc">展示 Hexo 站点配置、Butterfly 默认配置和根目录主题覆盖配置之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">配置文件怎么分工</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">站点信息归 Hexo，视觉和交互归 Butterfly，自定义配置放在根目录更安全。</text>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="80" y="175" width="300" height="230" rx="22" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="112" y="225" font-size="24" font-weight="700" fill="#1d4ed8">_config.yml</text>
    <text x="112" y="258" font-size="16" fill="#64748b">Hexo 根目录</text>
    <line x1="112" y1="282" x2="348" y2="282" stroke="#dbeafe"/>
    <text x="112" y="318" font-size="16" fill="#172033">• title / author / language</text>
    <text x="112" y="350" font-size="16" fill="#172033">• url / root / permalink</text>
    <text x="112" y="382" font-size="16" fill="#172033">• deploy / feed / sitemap</text>
  </g>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="450" y="175" width="300" height="230" rx="22" fill="#ffffff" stroke="#fde68a"/>
    <text x="482" y="225" font-size="21" font-weight="700" fill="#b45309">themes/butterfly/_config.yml</text>
    <text x="482" y="258" font-size="16" fill="#64748b">主题默认配置</text>
    <line x1="482" y1="282" x2="718" y2="282" stroke="#fef3c7"/>
    <text x="482" y="318" font-size="16" fill="#172033">• 主题原始默认值</text>
    <text x="482" y="350" font-size="16" fill="#172033">• 升级时可能变化</text>
    <text x="482" y="382" font-size="16" fill="#172033">• 不建议直接魔改</text>
  </g>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="820" y="175" width="300" height="230" rx="22" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="852" y="225" font-size="24" font-weight="700" fill="#15803d">_config.butterfly.yml</text>
    <text x="852" y="258" font-size="16" fill="#64748b">根目录主题覆盖配置</text>
    <line x1="852" y1="282" x2="1088" y2="282" stroke="#dcfce7"/>
    <text x="852" y="318" font-size="16" fill="#172033">• menu / nav / cover</text>
    <text x="852" y="350" font-size="16" fill="#172033">• comments / search / inject</text>
    <text x="852" y="382" font-size="16" fill="#172033">• 同名项优先级更高</text>
  </g>
  <line x1="230" y1="430" x2="520" y2="510" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="600" y1="430" x2="600" y2="500" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="430" x2="680" y2="510" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <rect x="360" y="505" width="480" height="92" rx="24" fill="#172033"/>
    <text x="408" y="548" font-size="22" font-weight="700" fill="#ffffff">最终站点效果</text>
    <text x="408" y="578" font-size="16" fill="#cbd5e1">Hexo 合并配置 → Butterfly 渲染页面 → public/ 输出静态文件</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Butterfly 页面布局示意</title>
  <desc id="desc">展示 Butterfly 首页常见区域：导航栏、顶部图、文章列表、侧边栏、评论和页脚。</desc>
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="28" fill="#f8fafc"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">Butterfly 首页由哪些区域组成</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">先把大区域配稳，再慢慢加评论、搜索和动效。</text>
  <g filter="url(#shadow)">
    <rect x="70" y="150" width="760" height="500" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="70" y="150" width="760" height="46" rx="22" fill="#172033"/>
    <circle cx="105" cy="173" r="6" fill="#f87171"/>
    <circle cx="127" cy="173" r="6" fill="#fbbf24"/>
    <circle cx="149" cy="173" r="6" fill="#34d399"/>
    <text x="625" y="180" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="14" fill="#cbd5e1">首页 / 归档 / 标签 / 关于</text>
    <rect x="95" y="220" width="710" height="130" rx="18" fill="url(#hero)"/>
    <text x="130" y="276" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#ffffff">站点标题 + 打字副标题</text>
    <text x="130" y="313" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="16" fill="#e0f2fe">index_top_img / subtitle / nav</text>
    <rect x="95" y="375" width="430" height="105" rx="16" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="115" y="397" width="125" height="62" rx="10" fill="#93c5fd"/>
    <text x="260" y="422" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">文章卡片</text>
    <text x="260" y="450" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="14" fill="#475569">cover / post_meta / index_layout</text>
    <rect x="95" y="500" width="430" height="105" rx="16" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="115" y="522" width="125" height="62" rx="10" fill="#86efac"/>
    <text x="260" y="547" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">更多文章</text>
    <text x="260" y="575" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="14" fill="#475569">摘要、标签、分类、阅读时间</text>
    <rect x="555" y="375" width="250" height="230" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="680" cy="424" r="38" fill="#fdba74"/>
    <text x="612" y="490" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172033">侧边栏卡片</text>
    <text x="592" y="520" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="14" fill="#475569">avatar / aside / social</text>
    <text x="592" y="548" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="14" fill="#475569">公告、分类、标签、归档</text>
  </g>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <rect x="880" y="175" width="250" height="72" rx="18" fill="#dbeafe"/>
    <text x="910" y="205" font-size="18" font-weight="700" fill="#1d4ed8">第一层：站点身份</text>
    <text x="910" y="230" font-size="14" fill="#1e40af">title / avatar / nav</text>
    <rect x="880" y="275" width="250" height="72" rx="18" fill="#dcfce7"/>
    <text x="910" y="305" font-size="18" font-weight="700" fill="#15803d">第二层：阅读入口</text>
    <text x="910" y="330" font-size="14" fill="#166534">menu / cover / toc</text>
    <rect x="880" y="375" width="250" height="72" rx="18" fill="#fef3c7"/>
    <text x="910" y="405" font-size="18" font-weight="700" fill="#b45309">第三层：互动能力</text>
    <text x="910" y="430" font-size="14" fill="#92400e">search / comments / rss</text>
    <rect x="880" y="475" width="250" height="72" rx="18" fill="#fce7f3"/>
    <text x="910" y="505" font-size="18" font-weight="700" fill="#be185d">第四层：视觉增强</text>
    <text x="910" y="530" font-size="14" fill="#9d174d">theme_color / inject / effects</text>
  </g>
</svg>

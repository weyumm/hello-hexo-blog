<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Butterfly 主题安装流程</title>
  <desc id="desc">从 Hexo 根目录到安装主题、切换配置、安装渲染器和本地预览的流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">Butterfly 主题安装路线</text>
  <text x="60" y="112" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif" font-size="18" fill="#64748b">每完成一格就验证一次，问题会更容易定位。</text>
  <g font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <g filter="url(#shadow)">
      <rect x="60" y="180" width="190" height="190" rx="20" fill="#ffffff" stroke="#dbeafe"/>
      <circle cx="96" cy="222" r="24" fill="#dbeafe"/>
      <text x="88" y="231" font-size="24" font-weight="700" fill="#2563eb">1</text>
      <text x="86" y="275" font-size="22" font-weight="700" fill="#172033">进入根目录</text>
      <text x="86" y="310" font-size="15" fill="#64748b">看到 _config.yml</text>
      <text x="86" y="336" font-size="15" fill="#64748b">和 source/ themes/</text>
    </g>
    <line x1="260" y1="275" x2="325" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="335" y="180" width="190" height="190" rx="20" fill="#ffffff" stroke="#dcfce7"/>
      <circle cx="371" cy="222" r="24" fill="#dcfce7"/>
      <text x="363" y="231" font-size="24" font-weight="700" fill="#16a34a">2</text>
      <text x="361" y="275" font-size="22" font-weight="700" fill="#172033">下载主题</text>
      <text x="361" y="310" font-size="15" fill="#64748b">themes/butterfly</text>
      <text x="361" y="336" font-size="15" fill="#64748b">Git 或 npm</text>
    </g>
    <line x1="535" y1="275" x2="600" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="610" y="180" width="190" height="190" rx="20" fill="#ffffff" stroke="#fde68a"/>
      <circle cx="646" cy="222" r="24" fill="#fef3c7"/>
      <text x="638" y="231" font-size="24" font-weight="700" fill="#d97706">3</text>
      <text x="636" y="275" font-size="22" font-weight="700" fill="#172033">切换主题</text>
      <text x="636" y="310" font-size="15" fill="#64748b">_config.yml</text>
      <text x="636" y="336" font-size="15" fill="#64748b">theme: butterfly</text>
    </g>
    <line x1="810" y1="275" x2="875" y2="275" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)">
      <rect x="885" y="180" width="190" height="190" rx="20" fill="#ffffff" stroke="#fbcfe8"/>
      <circle cx="921" cy="222" r="24" fill="#fce7f3"/>
      <text x="913" y="231" font-size="24" font-weight="700" fill="#db2777">4</text>
      <text x="911" y="275" font-size="22" font-weight="700" fill="#172033">安装渲染器</text>
      <text x="911" y="310" font-size="15" fill="#64748b">pug + stylus</text>
      <text x="911" y="336" font-size="15" fill="#64748b">避免源码直出</text>
    </g>
  </g>
  <path d="M980 390 C980 465 250 465 250 390" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 9" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)" font-family="Microsoft YaHei, PingFang SC, Segoe UI, sans-serif">
    <rect x="372" y="410" width="456" height="82" rx="20" fill="#172033"/>
    <text x="410" y="444" font-size="19" font-weight="700" fill="#ffffff">最后验证：hexo clean → hexo g → hexo s</text>
    <text x="410" y="472" font-size="15" fill="#cbd5e1">打开 localhost:4000，确认首页、文章页和资源路径正常。</text>
  </g>
</svg>
